name: Update SDK from API spec
on:
  workflow_dispatch:
  schedule:
    - cron:  '0 */6 * * *'

permissions: {}

jobs:
  update-sdk:
    if: github.repository == 'tremendous-rewards/tremendous-node'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - run: ./bin/generate

      - name: Generate PR description
        id: describe
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          description=$(./bin/generate-pr-description)
          if [ -z "$description" ]; then
            description=$(cat <<'FALLBACK'
          > [!IMPORTANT]
          > Write a description for this PR following [Conventional Commits](https://www.conventionalcommits.org/) before merging.

          cc @tremendous-rewards/platform
          FALLBACK
          )
          fi
          {
            echo "body<<EOF"
            echo "$description"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: "chore: regenerate SDK"
          body: ${{ steps.describe.outputs.body }}
          branch: automated/update-sdk
          commit-message: "Update generated SDK from latest OpenAPI spec"
          labels: automated

  notify:
    needs: update-sdk
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: notify
        uses: slackapi/slack-github-action@fc46ded2fc4d7f11bfa62864526f920cf1a1167d # v3.0.4
        with:
          errors: true
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
            - type: "section"
              text:
                type: "mrkdwn"
                text: "⛔ *<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}> failed to auto-update SDK*: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|build here>."
