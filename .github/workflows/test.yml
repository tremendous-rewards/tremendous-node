name: Run tests

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - 'main'
  schedule:
    - cron: '3 12,15,18 * * 1-5'

permissions:
  contents: read

jobs:
  test:
    if: github.repository == 'tremendous-rewards/tremendous-node'
    runs-on: ubuntu-latest

    env:
      SANDBOX_API_TOKEN: ${{ secrets.SANDBOX_API_TOKEN }}
      TEST_CAMPAIGN_ID: ${{ secrets.TEST_CAMPAIGN_ID }}
      TEST_PRODUCT_ID: ${{ secrets.TEST_PRODUCT_ID }}
      TEST_RECIPIENT_EMAIL: ${{ secrets.TEST_RECIPIENT_EMAIL }}

    strategy:
      matrix:
        node-version: ['20.x', '22.x', '24.x']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - run: npm ci
      - run: npm run build
      - run: npm run test

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  notify:
    needs: test
    if: ${{ failure() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: notify
        uses: slackapi/slack-github-action@fc46ded2fc4d7f11bfa62864526f920cf1a1167d # v3.0.4
        with:
          errors: true
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
            - type: "section"
              text:
                type: "mrkdwn"
                text: "⛔ *<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}> scheduled build failed*: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|build here>."
